name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    name: Tests & Static Analysis
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: eventhub
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/eventhub?serverVersion=8.0.32&charset=utf8mb4
      REDIS_URL: redis://127.0.0.1:6379
      MESSENGER_TRANSPORT_DSN: redis://127.0.0.1:6379/messages
      APP_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, pdo_mysql, redis
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate JWT keys
        run: |
          JWT_PASSPHRASE=$(openssl rand -hex 32)
          echo "JWT_PASSPHRASE=${JWT_PASSPHRASE}" >> $GITHUB_ENV
          mkdir -p config/jwt
          openssl genrsa -out config/jwt/private.pem -aes256 -passout pass:${JWT_PASSPHRASE} 4096
          openssl rsa -pubout -in config/jwt/private.pem -out config/jwt/public.pem -passin pass:${JWT_PASSPHRASE}

      - name: Setup test database
        run: |
          php bin/console doctrine:database:create --if-not-exists
          php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run PHPUnit
        run: php bin/phpunit

      - name: Warm Symfony cache for PHPStan
        env:
          APP_ENV: dev
          APP_DEBUG: '1'
        run: php bin/console cache:warmup

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse src -l 9 --memory-limit=512M
