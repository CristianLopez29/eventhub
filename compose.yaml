services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    tty: true
    stdin_open: true
    volumes:
      - .:/app
    expose:
      - "9000"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=eventhub
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  provider:
    build:
      context: .
      dockerfile: docker/provider/Dockerfile
    environment:
      - PROVIDER_MODE=${PROVIDER_MODE:-static}
    expose:
      - "8080"

volumes:
  mysql_data:
